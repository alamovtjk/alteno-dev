    <!-- PWA -->
    <meta name="theme-color" content="#ffffff" />

    <meta name="apple-mobile-web-app-title" content="AlTeNo Dev" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- SEO -->
    <title>AlTeNo Dev — AI Веб-студия из Душанбе</title>
    <meta name="description" content="AlTeNo Dev — AI веб-студия из Душанбе. Создаём сайты, приложения и дизайн с максимальным использованием AI. Быстро, красиво, по доступной цене." />
    <meta name="keywords" content="веб-студия, сайт на заказ, разработка сайтов, UI/UX дизайн, Таджикистан, Душанбе, AI разработка" />
    <meta name="author" content="Samir Alamov — AlTeNo Dev" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="AlTeNo Dev — AI Веб-студия" />
    <meta property="og:description" content="Создаём цифровые продукты с максимальным использованием AI. Быстро, красиво, по доступной цене." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ru_RU" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AlTeNo Dev — AI Веб-студия" />
    <meta name="twitter:description" content="Создаём цифровые продукты с максимальным использованием AI." />
    <meta name="twitter:image" content="/logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  </head>
  <body>

    <style>
      #splash {
        position: fixed; inset: 0; z-index: 99999;
        background: #fff url('/splash/splash-mobile.png') center/cover no-repeat;
        transition: opacity .5s ease;
      }
      @media (min-width: 601px) {
        #splash { background-image: url('/splash/splash-desktop.png'); }
      }
      #splash.sp-out { opacity: 0; pointer-events: none; }
    </style>

    <div id="splash"></div>

    <script>
      setTimeout(function() {
        var s = document.getElementById('splash');
        if (!s) return;
        s.classList.add('sp-out');
        setTimeout(function() { if (s) s.remove(); }, 500);
      }, 2000);
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
