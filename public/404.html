<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — AlTeNo Dev</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #050510;
      color: #fff;
      font-family: 'Manrope', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Noise grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: rgba(124, 58, 237, 0.18);
      top: -100px; left: -100px;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: rgba(13, 148, 136, 0.12);
      bottom: -80px; right: -80px;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Logo */
    .logo {
      font-family: 'Unbounded', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.01em;
      margin-bottom: 8px;
    }
    .logo span { color: #7c3aed; }

    /* 404 number */
    .code {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(96px, 20vw, 160px);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #7c3aed 0%, #0d9488 50%, #2563eb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(124, 58, 237, 0.4));
      letter-spacing: -.04em;
    }

    .title {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 700;
      color: #fff;
    }

    .sub {
      font-size: 15px;
      color: rgba(255,255,255,.45);
      max-width: 360px;
      line-height: 1.65;
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, #7c3aed, #0d9488);
      border-radius: 2px;
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #7c3aed, #0d9488);
      color: #fff;
      text-decoration: none;
      font-family: 'Manrope', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border-radius: 14px;
      transition: transform .2s, opacity .2s;
      margin-top: 8px;
    }
    .btn:hover { transform: translateY(-2px); opacity: .9; }
    .btn svg { width: 18px; height: 18px; }

    .hint {
      font-size: 13px;
      color: rgba(255,255,255,.25);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="content">
    <div class="logo">Al<span>Te</span>No <span style="color:#0d9488">Dev</span></div>

    <div class="code">404</div>

    <div class="title">Страница не найдена</div>

    <div class="divider"></div>

    <p class="sub">
      Эта страница не существует или была удалена.<br>
      Вернитесь на главную — там есть всё что нужно.
    </p>

    <a class="btn" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      На главную
    </a>

    <p class="hint">alteno-dev-silk.vercel.app</p>
  </div>
</body>
</html>
